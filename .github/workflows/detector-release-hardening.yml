name: One-time detector Release hardening

on:
  pull_request:
    paths:
      - '.github/workflows/detector-release-hardening.yml'
      - 'tools/apply_detector_release_hardening.py'

permissions:
  contents: write

jobs:
  harden:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply deterministic runtime and idempotency patch
        run: python tools/apply_detector_release_hardening.py
      - name: Commit hardened detector publication contract
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/build_detector_artifact.py tools/publish_detector_comparison.py .github/workflows/detector-comparison-publish.yml tests/test_detector_comparison.py AGENTS.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'detectors: harden batch-idempotent publication'
          for attempt in 1 2 3; do
            git fetch origin '${{ github.head_ref }}'
            git rebase 'origin/${{ github.head_ref }}'
            if git push origin 'HEAD:${{ github.head_ref }}'; then exit 0; fi
          done
          exit 1
