name: One-time detector Release hardening

on:
  pull_request:
    paths:
      - '.github/workflows/detector-release-hardening.yml'
      - 'tools/apply_detector_release_hardening.py'

permissions:
  contents: read

jobs:
  harden:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply deterministic runtime and idempotency patch
        run: python tools/apply_detector_release_hardening.py
      - name: Compile patched Python sources
        run: python -m py_compile tools/build_detector_artifact.py tools/publish_detector_comparison.py tests/test_detector_comparison.py
      - name: Record exact parent and base tree
        run: |
          git rev-parse HEAD > parent-commit.txt
          git rev-parse 'HEAD^{tree}' > base-tree.txt
      - name: Upload exact patched files
        uses: actions/upload-artifact@v4
        with:
          name: detector-release-hardening-${{ github.run_id }}
          path: |
            tools/build_detector_artifact.py
            tools/publish_detector_comparison.py
            .github/workflows/detector-comparison-publish.yml
            tests/test_detector_comparison.py
            AGENTS.md
            parent-commit.txt
            base-tree.txt
          if-no-files-found: error
          retention-days: 7
