name: One-time full-corpus detector gallery patch

on:
  pull_request:
    paths:
      - '.github/workflows/detector-gallery-patch.yml'
      - 'tools/apply_detector_gallery_patch.py'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply deterministic publisher and test patch
        run: python tools/apply_detector_gallery_patch.py
      - name: Commit full-corpus gallery implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/publish_detector_comparison.py tests/test_detector_comparison.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'detectors: make offline comparison gallery full-corpus'
          for attempt in 1 2 3; do
            git fetch origin '${{ github.head_ref }}'
            git rebase 'origin/${{ github.head_ref }}'
            if git push origin 'HEAD:${{ github.head_ref }}'; then exit 0; fi
          done
          exit 1
