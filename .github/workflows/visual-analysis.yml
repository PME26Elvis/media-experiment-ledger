name: Publish Prompt Repeatability Atlas

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: Optional batch label; production publishers fill this automatically
        required: false
        default: manual
        type: string
      force:
        description: Publish a new version even when the full-data fingerprint already exists
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - '.github/workflows/visual-analysis.yml'
      - 'tools/build_prompt_atlas.py'
      - 'tools/prompt_atlas_core.py'
      - 'tools/prompt_atlas_github.py'
      - 'tools/prompt_atlas_data.py'
      - 'tools/prompt_atlas_publish.py'
      - 'tools/prompt_atlas_build.py'
      - 'tools/prompt_atlas_packages.py'
      - 'tools/release_packaging.py'
      - 'tools/release_publishing.py'
      - 'requirements-visual-analysis.txt'
      - 'visual-analysis/config.json'

concurrency:
  group: prompt-repeatability-atlas
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install renderer and free CJK font
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r requirements-visual-analysis.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Resolve full-corpus build identity
        id: build
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BATCH_ID: ${{ inputs.batch_id }}
          INPUT_FORCE: ${{ inputs.force }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "push" ]]; then
            batch_id="code-${COMMIT_SHA:0:12}"
            force="true"
          else
            batch_id="${INPUT_BATCH_ID:-manual}"
            force="${INPUT_FORCE:-false}"
          fi
          batch_id="$(printf '%s' "$batch_id" | tr -c 'A-Za-z0-9._-' '-')"
          echo "batch_id=$batch_id" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"

      - name: Build and publish all-data Atlas
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --scope all
            --batch-id '${{ steps.build.outputs.batch_id }}'
            --repo '${{ github.repository }}'
            --config visual-analysis/config.json
            --output-dir visual-analysis/output
            --pages-index web/public/data/visual-analysis.json
            --preview-root web/public/data/visual-analysis/previews
            --publish
          )
          if [[ '${{ steps.build.outputs.force }}' == 'true' ]]; then
            args+=(--force)
          fi
          python tools/build_prompt_atlas.py "${args[@]}"

      - name: Upload failure recovery artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-prompt-atlas-${{ steps.build.outputs.batch_id }}
          path: |
            visual-analysis/output/
            web/public/data/visual-analysis.json
            web/public/data/visual-analysis/previews/
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0

      - name: Publish Visual Lab index and versioned note previews
        shell: bash
        run: |
          set -euo pipefail
          paths=(
            web/public/data/visual-analysis.json
            web/public/data/visual-analysis/previews
          )
          if [[ -z "$(git status --porcelain -- "${paths[@]}")" ]]; then
            echo "Visual Lab index and previews are unchanged"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "${paths[@]}"
          git commit -m 'visual: publish full-corpus prompt atlas index'

          # Analytics may update generated site files concurrently. Rebase and
          # retry immediately; no sleep/poll loop or persistent state is used.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt raced with another workflow; retrying after rebase"
          done
          echo 'Unable to publish the Visual Lab index after three conflict-safe attempts' >&2
          exit 1
