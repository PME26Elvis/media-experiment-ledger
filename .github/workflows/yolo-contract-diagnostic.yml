name: One-time YOLO contract diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/yolo-contract-diagnostic.yml'
      - 'tools/validate_project_contract.py'
      - 'project-contract.json'
      - 'README.md'
      - 'README.en.md'
      - 'AGENTS.md'
      - 'docs/**'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Capture contract output
        shell: bash
        run: |
          python tools/validate_project_contract.py > yolo-contract-diagnostic.log 2>&1 || true
      - name: Commit diagnostic
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add yolo-contract-diagnostic.log
          git commit -m 'Capture YOLO contract diagnostic'
          git push origin HEAD:${{ github.head_ref }}
