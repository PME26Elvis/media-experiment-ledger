name: One-time NanoDet documentation sync

on:
  pull_request:
    paths:
      - '.github/workflows/nanodet-doc-sync.yml'
      - 'tools/apply_nanodet_docs_sync.py'

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply deterministic documentation blocks
        run: python tools/apply_nanodet_docs_sync.py
      - name: Commit synchronized documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md README.en.md AGENTS.md docs/NANODET_MULTI_DETECTOR_PIPELINE_SPEC.md docs/PROJECT_CONTRACT.md docs/WEB_EXPERIENCE_AND_FORECASTS.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'docs: synchronize NanoDet implementation contract'
          for attempt in 1 2 3; do
            git fetch origin '${{ github.head_ref }}'
            git rebase 'origin/${{ github.head_ref }}'
            if git push origin 'HEAD:${{ github.head_ref }}'; then exit 0; fi
          done
          exit 1
