name: One-time contract synchronization bootstrap

on:
  push:
    branches:
      - agent/contracts-release-audit-yolo-spec
    paths:
      - tools/apply_contract_sync.py
      - .github/workflows/contract-sync-bootstrap.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/contracts-release-audit-yolo-spec
          fetch-depth: 0

      - name: Apply checked contract migrations
        run: python tools/apply_contract_sync.py

      - name: Validate syntax and synchronized contract
        run: |
          python tools/validate_project_contract.py
          python -m compileall tools tests

      - name: Commit final branch diff and remove bootstrap
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize contract, quarantine, and derived-data policy'
          git push origin HEAD:agent/contracts-release-audit-yolo-spec
