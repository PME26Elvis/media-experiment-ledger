name: One-time production Pages verification

on:
  pull_request:
    paths:
      - '.github/workflows/verify-pages-production.yml'

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Wait for merged production workflow and verify live Pages
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: d5276ffb4b5aa5f28830f9f8beb38f0002ab590f
          SITE_BASE: https://pme26elvis.github.io/media-experiment-ledger/
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          target_sha = os.environ['TARGET_SHA']
          site_base = os.environ['SITE_BASE'].rstrip('/') + '/'

          def gh_api(path):
              result = subprocess.run(
                  ['gh', 'api', path],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if result.returncode:
                  raise RuntimeError(result.stderr or result.stdout)
              return json.loads(result.stdout)

          selected = None
          for _ in range(120):
              payload = gh_api(
                  f'repos/{repo}/actions/runs?head_sha={target_sha}&event=push&per_page=50'
              )
              candidates = [
                  row for row in payload.get('workflow_runs', [])
                  if row.get('name') == 'Build analytics, forecasts, and Pages'
                  and row.get('head_sha') == target_sha
              ]
              if candidates:
                  selected = sorted(candidates, key=lambda row: row['id'])[-1]
                  if selected.get('status') == 'completed':
                      break
              time.sleep(10)
          if not selected:
              raise RuntimeError('No production Pages workflow found for target merge SHA')
          if selected.get('status') != 'completed':
              raise RuntimeError(f"Production Pages workflow did not finish: {selected}")

          jobs_payload = gh_api(f"repos/{repo}/actions/runs/{selected['id']}/jobs?per_page=100")
          jobs = jobs_payload.get('jobs', [])
          expected_jobs = {
              'build': 'success',
              'Deploy GitHub Pages': 'success',
              'Commit canonical analytics and forecasts': 'success',
          }
          actual_jobs = {job.get('name'): job.get('conclusion') for job in jobs}
          for name, conclusion in expected_jobs.items():
              if actual_jobs.get(name) != conclusion:
                  raise RuntimeError(
                      f"Expected job {name!r}={conclusion!r}; got {actual_jobs.get(name)!r}"
                  )
          if selected.get('conclusion') != 'success':
              raise RuntimeError(
                  f"Production workflow conclusion is {selected.get('conclusion')!r}"
              )

          routes = [
              '', 'overview/', 'analytics/', 'visual-lab/', 'yolo-lab/',
              'forecast/', 'architecture/', 'frontend-stack/'
          ]
          json_paths = [
              'data/analytics.json',
              'data/forecast.json',
              'data/visual-analysis.json',
              'data/yolo/latest.json',
          ]
          checked = {}
          remaining = [*routes, *json_paths]
          for _ in range(60):
              failures = []
              for relative in remaining:
                  url = site_base + relative
                  try:
                      request = urllib.request.Request(
                          url,
                          headers={'User-Agent': 'media-experiment-ledger-pages-verifier/1'},
                      )
                      with urllib.request.urlopen(request, timeout=30) as response:
                          body = response.read()
                          status = response.status
                      if status != 200:
                          raise RuntimeError(f'HTTP {status}')
                      if relative in json_paths:
                          value = json.loads(body.decode('utf-8'))
                          if not isinstance(value, dict):
                              raise RuntimeError('JSON payload is not an object')
                      checked[relative or '/'] = {
                          'url': url,
                          'status': status,
                          'size_bytes': len(body),
                      }
                  except Exception as exc:
                      failures.append({'path': relative, 'error': str(exc)})
              if not failures:
                  break
              time.sleep(10)
          if failures:
              raise RuntimeError(f'Live Pages verification failed after retries: {failures}')

          report = {
              'schema_version': 1,
              'verified_at_utc': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'repository': repo,
              'merge_sha': target_sha,
              'workflow': {
                  'id': selected['id'],
                  'name': selected['name'],
                  'html_url': selected['html_url'],
                  'status': selected['status'],
                  'conclusion': selected['conclusion'],
                  'jobs': actual_jobs,
              },
              'site_base': site_base,
              'live_checks': checked,
              'contract': {
                  'compiled_site_tracked': False,
                  'deployment_independent_of_writeback': True,
                  'primary_route_count': 7,
                  'json_artifact_count': 4,
              },
          }
          Path('pages-production-verification.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          lines = [
              '# GitHub Pages production verification',
              '',
              f"- Verified at: `{report['verified_at_utc']}`",
              f"- Merge SHA: `{target_sha}`",
              f"- Workflow run: [{selected['id']}]({selected['html_url']})",
              f"- Workflow conclusion: **{selected['conclusion']}**",
              '- Jobs: build / deploy / writeback all **success**',
              f"- Live site: {site_base}",
              f"- Live routes checked: **{len(routes)}** including the root redirect/landing page",
              f"- Live JSON artifacts checked: **{len(json_paths)}**",
              '- Compiled `site/` remains an ephemeral Pages artifact and is not tracked by Git.',
              '- Pages deployment is independent of canonical analytics/forecast Git writeback.',
              '',
              '## Live checks',
              '',
              '| Path | HTTP | Bytes |',
              '|---|---:|---:|',
          ]
          for relative, item in checked.items():
              lines.append(
                  f"| [{relative}]({item['url']}) | {item['status']} | {item['size_bytes']:,} |"
              )
          Path('PAGES_DEPLOY_VERIFICATION.md').write_text(
              '\n'.join(lines) + '\n', encoding='utf-8'
          )
          PY
      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: pages-production-verification-${{ github.run_id }}
          path: |
            pages-production-verification.json
            PAGES_DEPLOY_VERIFICATION.md
          if-no-files-found: error
          retention-days: 7
