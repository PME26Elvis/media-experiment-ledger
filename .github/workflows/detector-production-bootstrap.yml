name: One-time NanoDet production bootstrap

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/detector-production-bootstrap.yml'

permissions:
  actions: write
  contents: read

jobs:
  production:
    if: github.repository == 'PME26Elvis/media-experiment-ledger'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Dispatch one immutable detector batch
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          batch="detection-production-${GITHUB_SHA}"
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "batch=$batch" >> "$GITHUB_OUTPUT"
          echo "started=$started" >> "$GITHUB_OUTPUT"
          gh workflow run detector-yolox-inference.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f analysis_batch_id="$batch" \
            -f confidence_threshold='0.25' \
            -f nms_iou_threshold='0.45'
          gh workflow run detector-nanodet-inference.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f analysis_batch_id="$batch" \
            -f confidence_threshold='0.25' \
            -f nms_iou_threshold='0.45'
          echo "Dispatched exact batch: $batch"

      - name: Wait for detector pair, publisher, Release, writeback, Pages, and Atlas non-regression
        env:
          BATCH_ID: ${{ steps.dispatch.outputs.batch }}
          STARTED_AT: ${{ steps.dispatch.outputs.started }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          import subprocess
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          from typing import Any

          repo = os.environ['GITHUB_REPOSITORY']
          batch = os.environ['BATCH_ID']
          started = datetime.fromisoformat(os.environ['STARTED_AT'].replace('Z', '+00:00'))
          deadline = time.monotonic() + 5 * 60 * 60
          poll_seconds = 20
          evidence: dict[str, Any] = {
              'schema_version': 1,
              'repository': repo,
              'analysis_batch_id': batch,
              'bootstrap_workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'bootstrap_head_sha': os.environ['GITHUB_SHA'],
              'started_at_utc': started.isoformat(),
          }

          def gh(path: str) -> Any:
              result = subprocess.run(
                  ['gh', 'api', path],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if result.returncode:
                  raise RuntimeError(result.stderr or result.stdout)
              return json.loads(result.stdout or 'null')

          def workflow_runs(workflow: str, *, event: str | None = None) -> list[dict[str, Any]]:
              query = f'?branch=main&per_page=100'
              if event:
                  query += f'&event={event}'
              payload = gh(f'repos/{repo}/actions/workflows/{workflow}/runs{query}')
              return list(payload.get('workflow_runs', []))

          def parse_time(value: str | None) -> datetime:
              return datetime.fromisoformat(str(value).replace('Z', '+00:00'))

          def candidate_run(workflow: str) -> dict[str, Any] | None:
              rows = [
                  row for row in workflow_runs(workflow, event='workflow_dispatch')
                  if row.get('head_branch') == 'main'
                  and parse_time(row.get('created_at')) >= started - timedelta(seconds=20)
              ]
              return max(rows, key=lambda row: int(row['id'])) if rows else None

          def wait_detector(workflow: str, artifact_name: str) -> dict[str, Any]:
              selected: dict[str, Any] | None = None
              while time.monotonic() < deadline:
                  selected = candidate_run(workflow)
                  if not selected:
                      print(f'Waiting for {workflow} run registration...', flush=True)
                      time.sleep(poll_seconds)
                      continue
                  run_id = int(selected['id'])
                  current = gh(f'repos/{repo}/actions/runs/{run_id}')
                  print(
                      f'{workflow} run {run_id}: {current.get("status")} / '
                      f'{current.get("conclusion")}',
                      flush=True,
                  )
                  if current.get('status') != 'completed':
                      time.sleep(poll_seconds)
                      continue
                  if current.get('conclusion') != 'success':
                      raise RuntimeError(
                          f'{workflow} run {run_id} concluded {current.get("conclusion")}'
                      )
                  artifacts = gh(f'repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100')
                  matching = [
                      item for item in artifacts.get('artifacts', [])
                      if not item.get('expired') and item.get('name') == artifact_name
                  ]
                  if len(matching) != 1:
                      raise RuntimeError(
                          f'{workflow} run {run_id} expected artifact {artifact_name}; '
                          f'found {[item.get("name") for item in artifacts.get("artifacts", [])]}'
                      )
                  return {
                      'workflow': workflow,
                      'run_id': run_id,
                      'head_sha': current.get('head_sha'),
                      'html_url': current.get('html_url'),
                      'created_at': current.get('created_at'),
                      'updated_at': current.get('updated_at'),
                      'artifact': {
                          'id': matching[0]['id'],
                          'name': matching[0]['name'],
                          'size_in_bytes': matching[0]['size_in_bytes'],
                          'digest': matching[0].get('digest'),
                      },
                  }
              raise TimeoutError(f'Timed out waiting for {workflow}')

          atlas_before = gh(f'repos/{repo}/contents/web/public/data/visual-analysis.json?ref=main')['sha']
          evidence['atlas_index_sha_before'] = atlas_before

          yolox = wait_detector(
              'detector-yolox-inference.yml', f'detector-yolox-{batch}'
          )
          nanodet = wait_detector(
              'detector-nanodet-inference.yml', f'detector-nanodet-{batch}'
          )
          if yolox['head_sha'] != nanodet['head_sha']:
              raise RuntimeError(
                  f'Detector head SHAs differ: {yolox["head_sha"]} != {nanodet["head_sha"]}'
              )
          evidence['detectors'] = {'yolox-tiny': yolox, 'nanodet-plus-m-320': nanodet}

          def matching_release() -> dict[str, Any] | None:
              page = 1
              while page <= 10:
                  rows = gh(f'repos/{repo}/releases?per_page=100&page={page}')
                  if not rows:
                      return None
                  for row in rows:
                      if (
                          str(row.get('tag_name', '')).startswith('media-detection-all-')
                          and batch in str(row.get('body') or '')
                          and not row.get('draft')
                      ):
                          return row
                  page += 1
              return None

          release: dict[str, Any] | None = None
          latest_index: dict[str, Any] | None = None
          while time.monotonic() < deadline:
              release = matching_release()
              try:
                  content = gh(f'repos/{repo}/contents/data/detection/latest.json?ref=main')
                  latest_index = json.loads(
                      base64.b64decode(content['content']).decode('utf-8')
                  )
              except Exception as exc:
                  print(f'Latest index not ready: {exc}', flush=True)
                  latest_index = None
              if (
                  release
                  and latest_index
                  and latest_index.get('status') == 'published'
                  and latest_index.get('analysis_batch_id') == batch
              ):
                  break
              print('Waiting for publisher Release and index writeback...', flush=True)
              time.sleep(poll_seconds)
          if not release or not latest_index:
              raise TimeoutError('Timed out waiting for published detector Release/index')

          assets = list(release.get('assets', []))
          if not assets or any(not str(item.get('name', '')).endswith('.zip') for item in assets):
              raise RuntimeError('Detector Release must contain ZIP-only assets')
          evidence['release'] = {
              'tag': release['tag_name'],
              'html_url': release['html_url'],
              'published_at': release.get('published_at'),
              'assets': [
                  {
                      'name': item['name'],
                      'size_in_bytes': item['size'],
                      'download_count': item.get('download_count'),
                  }
                  for item in assets
              ],
          }
          evidence['latest_index'] = latest_index

          def publisher_run() -> dict[str, Any] | None:
              rows = [
                  row for row in workflow_runs('detector-comparison-publish.yml')
                  if row.get('head_branch') == 'main'
                  and parse_time(row.get('created_at')) >= started - timedelta(seconds=20)
                  and row.get('status') == 'completed'
                  and row.get('conclusion') == 'success'
              ]
              for row in sorted(rows, key=lambda item: int(item['id']), reverse=True):
                  artifacts = gh(
                      f'repos/{repo}/actions/runs/{int(row["id"])}/artifacts?per_page=100'
                  )
                  names = [item.get('name') for item in artifacts.get('artifacts', [])]
                  if any(str(name).startswith('detector-comparison-recovery-') for name in names):
                      return {
                          'run_id': int(row['id']),
                          'head_sha': row.get('head_sha'),
                          'html_url': row.get('html_url'),
                          'created_at': row.get('created_at'),
                          'updated_at': row.get('updated_at'),
                          'artifacts': names,
                      }
              return None

          publisher: dict[str, Any] | None = None
          while time.monotonic() < deadline:
              publisher = publisher_run()
              if publisher:
                  break
              print('Waiting for exact-run publisher evidence...', flush=True)
              time.sleep(poll_seconds)
          if not publisher:
              raise TimeoutError('Timed out waiting for publisher workflow evidence')
          evidence['publisher'] = publisher

          atlas_after = gh(f'repos/{repo}/contents/web/public/data/visual-analysis.json?ref=main')['sha']
          evidence['atlas_index_sha_after'] = atlas_after
          evidence['atlas_non_regression'] = atlas_before == atlas_after
          if atlas_before != atlas_after:
              raise RuntimeError(
                  f'Atlas index changed during detector publication: {atlas_before} -> {atlas_after}'
              )

          pages_root = 'https://pme26elvis.github.io/media-experiment-ledger'
          pages_ready = False
          pages_payload: dict[str, Any] | None = None
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen(
                      f'{pages_root}/data/detection/latest.json', timeout=30
                  ) as response:
                      pages_payload = json.loads(response.read().decode('utf-8'))
                  with urllib.request.urlopen(
                      f'{pages_root}/detector-lab/', timeout=30
                  ) as response:
                      page = response.read().decode('utf-8', errors='replace')
                  pages_ready = (
                      pages_payload.get('analysis_batch_id') == batch
                      and pages_payload.get('status') == 'published'
                      and 'Detector Lab' in page
                  )
              except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as exc:
                  print(f'Pages not ready: {exc}', flush=True)
              if pages_ready:
                  break
              time.sleep(poll_seconds)
          if not pages_ready:
              raise TimeoutError('Timed out waiting for live Detector Lab/JSON')
          evidence['pages'] = {
              'detector_lab_url': f'{pages_root}/detector-lab/',
              'index_url': f'{pages_root}/data/detection/latest.json',
              'status': 'verified',
              'analysis_batch_id': pages_payload.get('analysis_batch_id') if pages_payload else None,
          }

          evidence['completed_at_utc'] = datetime.now(timezone.utc).isoformat()
          Path('nanodet-production-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True), encoding='utf-8'
          )
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nanodet-production-evidence-${{ github.run_id }}
          path: nanodet-production-evidence.json
          if-no-files-found: warn
          retention-days: 30
