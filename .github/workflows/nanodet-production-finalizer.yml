name: One-time NanoDet production finalizer

on:
  pull_request:
    paths:
      - '.github/workflows/nanodet-production-finalizer.yml'
      - 'tools/finalize_nanodet_production.py'

permissions:
  actions: write
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Dispatch current main Pages build and deployment
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run analytics.yml --repo "${{ github.repository }}" --ref main
          echo 'Dispatched main analytics/Pages build; finalizer will wait for live Detector Lab convergence.'

      - name: Resolve production evidence and build synchronized patch
        run: python tools/finalize_nanodet_production.py

      - name: Lock exact model supply-chain wording
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/NANODET_MULTI_DETECTOR_PIPELINE_SPEC.md')
          text = path.read_text(encoding='utf-8')
          sentence = 'The production model is the official immutable pre-exported ONNX asset from the pinned upstream Release.'
          if sentence not in text:
              marker = '<!-- NANODET:IMPLEMENTATION:END -->'
              text = text.replace(marker, sentence + '\n\n' + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Validate generated production contract
        shell: bash
        run: |
          set -o pipefail
          {
            python tools/validate_project_contract.py
            python -m compileall tools tests
            python -m unittest tests.test_nanodet_pipeline_spec tests.test_detector_comparison -v
          } 2>&1 | tee nanodet-finalization-validation.log

      - name: Commit synchronized production status and evidence
        shell: bash
        run: |
          set -euo pipefail
          paths=(
            project-contract.json
            tools/validate_project_contract.py
            tests/test_nanodet_pipeline_spec.py
            README.md
            README.en.md
            AGENTS.md
            docs/PROJECT_CONTRACT.md
            docs/NANODET_MULTI_DETECTOR_PIPELINE_SPEC.md
            docs/reports/NANODET_PRODUCTION_EVIDENCE.json
            docs/reports/NANODET_PRODUCTION_EVIDENCE.md
            data/detection/latest.json
            data/detection/history.json
            web/public/data/detection/latest.json
          )
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "${paths[@]}"
          if git diff --cached --quiet; then
            echo 'NanoDet production finalization is already current'
            exit 0
          fi
          git commit -m 'docs: finalize verified NanoDet production status'
          for attempt in 1 2 3; do
            git fetch origin '${{ github.head_ref }}'
            git rebase 'origin/${{ github.head_ref }}'
            if git push origin 'HEAD:${{ github.head_ref }}'; then
              exit 0
            fi
          done
          exit 1

      - name: Upload finalization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nanodet-production-finalization-${{ github.run_id }}
          path: |
            docs/reports/NANODET_PRODUCTION_EVIDENCE.json
            docs/reports/NANODET_PRODUCTION_EVIDENCE.md
            nanodet-finalization-manifest.json
            nanodet-finalization-validation.log
          if-no-files-found: warn
          retention-days: 14
