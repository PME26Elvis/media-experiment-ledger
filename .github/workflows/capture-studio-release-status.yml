name: Capture Studio release status

on:
  push:
    branches: [app-v1-beta-trigger]
    paths:
      - '.github/release-status-request.json'

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: app-v1-beta-trigger
      - name: Capture recent app-main workflow runs and Studio releases
        shell: bash
        run: |
          set +e
          gh api -X GET "repos/${GITHUB_REPOSITORY}/actions/runs" \
            -f branch=app-main -f per_page=50 \
            > workflow-runs-raw.json 2> workflow-runs-error.txt
          runs_status=$?
          gh api -X GET "repos/${GITHUB_REPOSITORY}/releases" \
            -f per_page=50 \
            > releases-raw.json 2> releases-error.txt
          releases_status=$?
          RUNS_STATUS="$runs_status" RELEASES_STATUS="$releases_status" python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def load(path: str, fallback):
              try:
                  return json.loads(Path(path).read_text(encoding='utf-8'))
              except Exception:
                  return fallback

          runs_raw = load('workflow-runs-raw.json', {})
          releases_raw = load('releases-raw.json', [])
          runs = []
          for item in runs_raw.get('workflow_runs', []):
              runs.append({key: item.get(key) for key in (
                  'id', 'name', 'event', 'status', 'conclusion', 'run_number',
                  'head_sha', 'head_branch', 'created_at', 'updated_at', 'html_url',
              )})
          releases = []
          for item in releases_raw if isinstance(releases_raw, list) else []:
              tag = str(item.get('tag_name') or '')
              if not tag.startswith('studio-v'):
                  continue
              releases.append({
                  'id': item.get('id'),
                  'tag_name': tag,
                  'name': item.get('name'),
                  'draft': item.get('draft'),
                  'prerelease': item.get('prerelease'),
                  'created_at': item.get('created_at'),
                  'published_at': item.get('published_at'),
                  'target_commitish': item.get('target_commitish'),
                  'html_url': item.get('html_url'),
                  'assets': [
                      {key: asset.get(key) for key in ('name', 'size', 'state', 'browser_download_url')}
                      for asset in item.get('assets', [])
                  ],
              })
          payload = {
              'captured_at_utc': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'api_status': {
                  'workflow_runs': int(os.environ['RUNS_STATUS']),
                  'releases': int(os.environ['RELEASES_STATUS']),
              },
              'errors': {
                  'workflow_runs': Path('workflow-runs-error.txt').read_text(encoding='utf-8', errors='replace'),
                  'releases': Path('releases-error.txt').read_text(encoding='utf-8', errors='replace'),
              },
              'workflow_runs': runs,
              'studio_releases': releases,
          }
          Path('release-monitor-result.json').write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Capture requested failure job log tails
        shell: bash
        run: |
          set +e
          python - <<'PY' > requested-job-ids.txt
          import json
          from pathlib import Path
          request = json.loads(Path('.github/release-status-request.json').read_text())
          for value in request.get('job_ids', []):
              print(int(value))
          PY
          : > release-failure-summary.txt
          while IFS= read -r job_id; do
            [[ -n "$job_id" ]] || continue
            log_file="job-${job_id}.log"
            echo "===== JOB ${job_id} =====" >> release-failure-summary.txt
            gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" \
              > "$log_file" 2>> release-failure-summary.txt
            status=$?
            if [[ $status -ne 0 ]]; then
              echo "log download failed with status ${status}" >> release-failure-summary.txt
              continue
            fi
            echo "--- matched diagnostics ---" >> release-failure-summary.txt
            grep -Ein 'error|failed|failure|cannot|not found|invalid|ENOENT|ERR_' "$log_file" \
              | tail -n 120 >> release-failure-summary.txt || true
            echo "--- tail ---" >> release-failure-summary.txt
            tail -n 220 "$log_file" >> release-failure-summary.txt
          done < requested-job-ids.txt
      - name: Commit status snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-monitor-result.json release-failure-summary.txt
          git commit -m 'Capture Studio release status and failure logs' || exit 0
          git push origin HEAD:app-v1-beta-trigger
