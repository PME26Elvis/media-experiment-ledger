name: Studio Release Core

on:
  workflow_call:
    inputs:
      source_ref:
        description: app-main branch, tag, or exact commit to release
        required: true
        type: string
      version_override:
        required: false
        default: ''
        type: string
      channel_override:
        required: false
        default: ''
        type: string
      release_notes_override:
        required: false
        default: ''
        type: string
      features_override:
        required: false
        default: ''
        type: string
      quick_start_tag_override:
        required: false
        default: ''
        type: string
      full_research_tag_override:
        required: false
        default: ''
        type: string
      draft_override:
        required: false
        default: ''
        type: string
      publish_override:
        required: false
        default: ''
        type: string
    secrets:
      WIN_CSC_LINK: { required: false }
      WIN_CSC_KEY_PASSWORD: { required: false }
      MAC_CSC_LINK: { required: false }
      MAC_CSC_KEY_PASSWORD: { required: false }
      APPLE_ID: { required: false }
      APPLE_APP_SPECIFIC_PASSWORD: { required: false }
      APPLE_TEAM_ID: { required: false }
      RELEASE_GPG_PRIVATE_KEY: { required: false }
      RELEASE_GPG_PASSPHRASE: { required: false }

permissions:
  contents: write

concurrency:
  group: studio-release-${{ inputs.source_ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      channel: ${{ steps.plan.outputs.channel }}
      draft: ${{ steps.plan.outputs.draft }}
      publish: ${{ steps.plan.outputs.publish }}
      source_sha: ${{ steps.plan.outputs.source_sha }}
      release_date_taipei: ${{ steps.plan.outputs.release_date_taipei }}
    env:
      GH_TOKEN: ${{ github.token }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
      RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Resolve immutable source commit
        id: source
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Read existing Studio tags
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/studio-v" \
            --jq '.[].ref' > existing-studio-tags.txt
      - name: Resolve release plan and collision-safe version
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          python app/scripts/resolve_release_plan.py \
            --request app/release-request.json \
            --package app/package.json \
            --existing-tags existing-studio-tags.txt \
            --source-sha "${{ steps.source.outputs.sha }}" \
            --version-override "${{ inputs.version_override }}" \
            --channel-override "${{ inputs.channel_override }}" \
            --notes-override "${{ inputs.release_notes_override }}" \
            --features-override "${{ inputs.features_override }}" \
            --quick-start-tag-override "${{ inputs.quick_start_tag_override }}" \
            --full-research-tag-override "${{ inputs.full_research_tag_override }}" \
            --draft-override "${{ inputs.draft_override }}" \
            --publish-override "${{ inputs.publish_override }}" \
            --output release-plan.json \
            --github-output "$GITHUB_OUTPUT"
      - name: Enforce stable signing and notarization credentials
        if: steps.plan.outputs.channel == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          required=(
            WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
            MAC_CSC_LINK MAC_CSC_KEY_PASSWORD
            APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            RELEASE_GPG_PRIVATE_KEY RELEASE_GPG_PASSPHRASE
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing stable-release secret: ${name}" >&2
              exit 1
            fi
          done
      - name: Confirm tag remains unused
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.plan.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release already exists and will not be replaced: ${{ steps.plan.outputs.tag }}" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: studio-release-plan
          path: release-plan.json
          if-no-files-found: error
          retention-days: 30

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runner: windows-latest
            family: windows
            arch_flag: --x64
          - id: linux-x64
            runner: ubuntu-latest
            family: linux
            arch_flag: --x64
          - id: macos-arm64
            runner: macos-latest
            family: macos
            arch_flag: --arm64
          - id: macos-x64
            runner: macos-15-intel
            family: macos
            arch_flag: --x64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linux display runtime
        if: matrix.family == 'linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
      - name: Install locked JavaScript dependencies
        run: npm ci --loglevel error
      - name: Set resolved application version
        run: npm version "${{ needs.preflight.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Install engine build dependencies
        run: python -m pip install --quiet -r engine/requirements.txt -r engine/requirements-build.txt
      - name: Typecheck application
        run: npm run typecheck
      - name: JavaScript tests
        run: npm test
      - name: Python engine tests
        run: python scripts/run_python_tests.py
      - name: Release tooling tests
        run: python -m unittest discover -s scripts/tests -p "test_release_*.py"
      - name: Build self-contained engine
        run: python scripts/build_engine.py
      - name: Build renderer and Electron processes
        run: npm run build
      - name: Generate SBOM and notices
        run: node scripts/generate_release_evidence.mjs
      - name: Build unsigned Windows prerelease packages
        if: matrix.family == 'windows' && needs.preflight.outputs.channel != 'stable'
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win nsis portable ${{ matrix.arch_flag }} --publish never
      - name: Build signed Windows stable packages
        if: matrix.family == 'windows' && needs.preflight.outputs.channel == 'stable'
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
        run: npx electron-builder --win nsis portable ${{ matrix.arch_flag }} --publish never
      - name: Build Linux packages
        if: matrix.family == 'linux'
        shell: bash
        run: npx electron-builder --linux AppImage deb ${{ matrix.arch_flag }} --publish never
      - name: Build unsigned macOS prerelease packages
        if: matrix.family == 'macos' && needs.preflight.outputs.channel != 'stable'
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg zip ${{ matrix.arch_flag }} --publish never
      - name: Build signed and notarized macOS stable packages
        if: matrix.family == 'macos' && needs.preflight.outputs.channel == 'stable'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac dmg zip ${{ matrix.arch_flag }} --publish never
      - name: Launch packaged application smoke
        run: python scripts/smoke_packaged_app.py
      - name: Verify Windows stable signatures
        if: matrix.family == 'windows' && needs.preflight.outputs.channel == 'stable'
        shell: pwsh
        run: |
          $files = Get-ChildItem release -Recurse -Filter *.exe | Where-Object { $_.FullName -notmatch 'unpacked' }
          if ($files.Count -lt 2) { throw 'Expected NSIS and portable executables.' }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid signature for $($file.Name): $($signature.Status)"
            }
          }
      - name: Verify macOS stable signing and notarization
        if: matrix.family == 'macos' && needs.preflight.outputs.channel == 'stable'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find release -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
      - name: Collect platform packages and evidence
        run: python scripts/collect_platform_artifacts.py --platform-id "${{ matrix.id }}"
      - uses: actions/upload-artifact@v4
        with:
          name: studio-build-${{ matrix.id }}
          path: app/artifact-out/*
          if-no-files-found: error
          retention-days: 14

  finalize:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
      RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}
          show-progress: false
      - uses: actions/download-artifact@v4
        with:
          name: studio-release-plan
          path: plan
      - uses: actions/download-artifact@v4
        with:
          pattern: studio-build-*
          path: staging
          merge-multiple: true
      - name: Render Release notes from resolved plan
        run: |
          python app/scripts/render_release_notes.py \
            --plan plan/release-plan.json \
            --output staging/RELEASE_NOTES.md
      - name: Finalize checksums and manifest
        run: |
          python app/scripts/finalize_release_assets.py \
            --root staging \
            --plan plan/release-plan.json
      - name: Sign checksum manifest when configured
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${RELEASE_GPG_PRIVATE_KEY:-}" ]]; then
            printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --armor --detach-sign \
              --pinentry-mode loopback \
              --passphrase "$RELEASE_GPG_PASSPHRASE" \
              --output staging/SHA256SUMS.asc \
              staging/SHA256SUMS
          elif [[ "${{ needs.preflight.outputs.channel }}" == 'stable' ]]; then
            echo 'Stable release requires a GPG checksum signature.' >&2
            exit 1
          else
            echo 'Prerelease checksum file is intentionally unsigned.'
          fi
      - name: Verify complete package and evidence matrix
        run: |
          python app/scripts/verify_release_assets.py \
            --root staging \
            --plan plan/release-plan.json \
            --output staging/release-verification.json
          test -s staging/SHA256SUMS
          test -s staging/release-manifest.json
          test -s staging/RELEASE_NOTES.md
      - uses: actions/upload-artifact@v4
        with:
          name: studio-release-${{ needs.preflight.outputs.version }}
          path: staging/*
          if-no-files-found: error
          retention-days: 30
      - name: Create private draft Release and upload complete assets
        if: needs.preflight.outputs.publish == 'true'
        shell: bash
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_SHA: ${{ needs.preflight.outputs.source_sha }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Refusing to modify existing Release: $TAG" >&2
            exit 1
          fi
          title="Media Experiment Ledger Studio ${{ needs.preflight.outputs.version }}"
          prerelease=()
          if [[ "${{ needs.preflight.outputs.channel }}" != 'stable' ]]; then
            prerelease+=(--prerelease)
          fi
          gh release create "$TAG" \
            --target "$SOURCE_SHA" \
            --title "$title" \
            --notes-file staging/RELEASE_NOTES.md \
            --draft \
            "${prerelease[@]}"
          gh release upload "$TAG" staging/*
      - name: Publish completed Release when requested
        if: needs.preflight.outputs.publish == 'true' && needs.preflight.outputs.draft == 'false'
        shell: bash
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.preflight.outputs.channel }}" == 'stable' ]]; then
            gh release edit "$TAG" --draft=false --prerelease=false
          else
            gh release edit "$TAG" --draft=false --prerelease
          fi
      - name: Clean staging workspace
        if: always()
        shell: bash
        run: rm -rf staging plan
