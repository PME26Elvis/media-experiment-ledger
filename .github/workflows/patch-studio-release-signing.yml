name: Patch Studio release signing environments

on:
  push:
    branches: [app-v1-release-packaging-fix]
    paths:
      - '.github/release-signing-patch-request.json'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: app-v1-release-packaging-fix
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Separate prerelease and stable signing environments
        run: python tools/patch_studio_release_signing.py
      - name: Validate patched workflow contract
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/app-release-core.yml').read_text()
          assert text.count('Build unsigned macOS prerelease packages') == 1
          assert text.count('Build signed and notarized macOS stable packages') == 1
          assert text.count('Build unsigned Windows prerelease packages') == 1
          assert text.count('Build signed Windows stable packages') == 1
          unsigned_mac = text.split('Build unsigned macOS prerelease packages', 1)[1].split('Build signed and notarized macOS stable packages', 1)[0]
          unsigned_win = text.split('Build unsigned Windows prerelease packages', 1)[1].split('Build signed Windows stable packages', 1)[0]
          assert 'MAC_CSC_LINK' not in unsigned_mac
          assert 'APPLE_ID' not in unsigned_mac
          assert 'WIN_CSC_LINK' not in unsigned_win
          assert "CSC_IDENTITY_AUTO_DISCOVERY: 'false'" in unsigned_mac
          assert "CSC_IDENTITY_AUTO_DISCOVERY: 'false'" in unsigned_win
          PY
      - name: Commit patched release core
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/app-release-core.yml
          git commit -m 'Separate prerelease and stable signing environments'
          git push origin HEAD:app-v1-release-packaging-fix
