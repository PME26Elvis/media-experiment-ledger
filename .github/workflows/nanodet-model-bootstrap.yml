name: One-time NanoDet model bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/nanodet-model-bootstrap.yml'
      - 'tools/prepare_nanodet_model.py'
      - 'tools/nanodet_core.py'
      - 'object-detection/nanodet-model-lock.json'
      - 'requirements-nanodet.txt'

permissions:
  contents: read

jobs:
  model-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install minimal ONNX Runtime dependencies
        run: python -m pip install -r requirements-nanodet.txt
      - name: Record official Release asset inventory
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/RangiLyu/nanodet/releases/tags/v1.0.0-alpha-1 > nanodet-release.json
          jq '[.assets[] | {name,size,browser_download_url,content_type}]' nanodet-release.json > nanodet-release-assets.json
          cat nanodet-release-assets.json
      - name: Download official ONNX, record checksum, and execute real shape smoke
        shell: bash
        run: |
          set -euo pipefail
          python tools/prepare_nanodet_model.py \
            --lock object-detection/nanodet-model-lock.json \
            --output '${{ runner.temp }}/nanodet-model/nanodet-plus-m-320.onnx' \
            --report nanodet-bootstrap-report.json \
            --allow-unpinned | tee nanodet-model-smoke.log
      - name: Upload complete bootstrap evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nanodet-model-bootstrap-${{ github.run_id }}
          path: |
            nanodet-release-assets.json
            nanodet-model-smoke.log
            nanodet-bootstrap-report.json
          if-no-files-found: warn
          retention-days: 7
