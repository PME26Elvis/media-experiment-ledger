name: One-time NanoDet model bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/nanodet-model-bootstrap.yml'
      - 'tools/prepare_nanodet_model.py'
      - 'tools/nanodet_core.py'
      - 'object-detection/nanodet-model-lock.json'
      - 'requirements-nanodet-export.txt'

permissions:
  contents: read

jobs:
  export-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pinned PyTorch CPU
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            torch==1.13.1+cpu torchvision==0.14.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu
      - name: Install export dependencies
        run: python -m pip install -r requirements-nanodet-export.txt
      - name: Checkout exact official NanoDet tag
        run: |
          git clone --depth 1 --branch v1.0.0-alpha-1 \
            https://github.com/RangiLyu/nanodet.git '${{ runner.temp }}/nanodet-upstream'
          python -m pip install -e '${{ runner.temp }}/nanodet-upstream' --no-deps
      - name: Export official checkpoint and record immutable hashes
        run: |
          python tools/prepare_nanodet_model.py \
            --lock object-detection/nanodet-model-lock.json \
            --upstream '${{ runner.temp }}/nanodet-upstream' \
            --output '${{ runner.temp }}/nanodet-model/nanodet-plus-m-320.onnx' \
            --report '${{ runner.temp }}/nanodet-model/export-report.json' \
            --allow-unpinned
      - name: Run real ONNX Runtime shape smoke
        run: |
          MODEL='${{ runner.temp }}/nanodet-model/nanodet-plus-m-320.onnx' python - <<'PY'
          import json, os
          import numpy as np
          import onnxruntime as ort
          session = ort.InferenceSession(os.environ['MODEL'], providers=['CPUExecutionProvider'])
          input_meta = session.get_inputs()[0]
          output = session.run(None, {input_meta.name: np.zeros((1,3,320,320), dtype=np.float32)})[0]
          if list(output.shape) != [1, 2125, 112]:
              raise SystemExit(f'Unexpected NanoDet output shape: {output.shape}')
          print(json.dumps({'input': input_meta.name, 'output_shape': list(output.shape)}, indent=2))
          PY
      - name: Expose immutable supply-chain values
        run: |
          cat '${{ runner.temp }}/nanodet-model/export-report.json'
          cp '${{ runner.temp }}/nanodet-model/export-report.json' nanodet-bootstrap-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: nanodet-model-bootstrap-${{ github.run_id }}
          path: nanodet-bootstrap-report.json
          if-no-files-found: error
          retention-days: 7
