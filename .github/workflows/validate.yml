name: Validate ledger tooling

on:
  pull_request:
    paths:
      - "tools/**"
      - "tests/**"
      - "web/**"
      - "README.md"
      - "README.en.md"
      - "AGENTS.md"
      - "project-contract.json"
      - "config/**"
      - "docs/**"
      - "requirements-analytics.txt"
      - "requirements-forecast.txt"
      - "requirements-visual-analysis.txt"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "tests/**"
      - "web/**"
      - "README.md"
      - "README.en.md"
      - "AGENTS.md"
      - "project-contract.json"
      - "config/**"
      - "docs/**"
      - "requirements-analytics.txt"
      - "requirements-forecast.txt"
      - "requirements-visual-analysis.txt"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-analytics.txt
            requirements-forecast.txt
            requirements-visual-analysis.txt
      - name: Install Python and FFmpeg test dependencies
        run: |
          set -euo pipefail
          python -m pip install \
            -r requirements-analytics.txt \
            -r requirements-forecast.txt \
            -r requirements-visual-analysis.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
      - name: Validate synchronized project contract
        run: python tools/validate_project_contract.py
      - run: python -m compileall tools tests
      - name: Run complete unittest suite
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unittest.log
      - name: Upload unittest diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log-${{ github.run_id }}
          path: unittest.log
          if-no-files-found: error
          retention-days: 7
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install web dependencies
        run: npm install --prefix web --package-lock=false --no-audit --no-fund
      - name: Build production Pages site
        run: npm run build --prefix web
      - name: Validate Pages routes and artifact URLs
        run: python tools/validate_site_build.py
