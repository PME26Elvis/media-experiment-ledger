name: Validate ledger tooling

on:
  pull_request:
    paths:
      - "tools/**"
      - "tests/**"
      - "web/**"
      - "README.md"
      - "README.en.md"
      - "AGENTS.md"
      - "project-contract.json"
      - "config/**"
      - "docs/**"
      - "requirements-analytics.txt"
      - "requirements-forecast.txt"
      - "requirements-visual-analysis.txt"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout writable PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply one-time synchronized contract migration
        if: hashFiles('tools/finalize_contract_sync.py') != ''
        run: python tools/finalize_contract_sync.py

      - name: Commit synchronized branch state
        if: hashFiles('tools/finalize_contract_sync.py') == ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo 'No bootstrap changes to commit'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize contract, quarantine, and derived-data policy'
          git push origin HEAD:${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate synchronized project contract
        run: python tools/validate_project_contract.py
      - run: python -m compileall tools tests
