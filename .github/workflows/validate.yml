name: Validate ledger tooling

on:
  pull_request:
    paths:
      - "tools/**"
      - "tests/**"
      - "web/**"
      - "README.md"
      - "README.en.md"
      - "AGENTS.md"
      - "project-contract.json"
      - "config/**"
      - "docs/**"
      - "requirements-analytics.txt"
      - "requirements-forecast.txt"
      - "requirements-visual-analysis.txt"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout writable PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply legacy manifest compatibility fix
        if: hashFiles('tools/apply_readme_legacy_fix.py') != ''
        run: python tools/apply_readme_legacy_fix.py
      - name: Commit compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m 'Preserve legacy manifest README compatibility'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate synchronized project contract
        run: python tools/validate_project_contract.py
      - run: python -m compileall tools tests
