name: Validate ledger tooling

on:
  pull_request:
    paths:
      - "tools/**"
      - "tests/**"
      - "requirements-analytics.txt"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "tests/**"
      - "requirements-analytics.txt"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-analytics.txt
      - run: python -m pip install -r requirements-analytics.txt
      - run: python -m compileall tools tests
      - run: python -m unittest discover -s tests -v
