name: One-time YOLO documentation sync

on:
  pull_request:
    paths:
      - 'tools/apply_yolo_documentation_sync.py'
      - '.github/workflows/yolo-doc-sync.yml'

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact documentation synchronization
        run: python tools/apply_yolo_documentation_sync.py
      - name: Commit synchronized documentation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md README.en.md docs/YOLO_OBJECT_DETECTION_SPEC.md .gitignore tools/apply_yolo_documentation_sync.py
          git commit -m 'Synchronize implemented YOLO documentation'
          git push origin HEAD:${{ github.head_ref }}
