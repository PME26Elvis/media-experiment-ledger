name: Stable Performance Qualification

on:
  workflow_dispatch:
  pull_request:
    branches: [app-main]
    paths:
      - '.github/workflows/app-performance-benchmark.yml'
      - 'app/scripts/benchmark_large_corpus.py'
      - 'app/scripts/benchmark_report_pdf.cjs'
      - 'app/src/main/import-pipeline.ts'
      - 'app/src/main/report-renderer.ts'
      - 'app/src/shared/report-templates.ts'
      - 'app/package.json'
      - 'app/package-lock.json'

permissions:
  contents: read

concurrency:
  group: stable-performance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qualify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install display and PDF inspection runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          python -m pip install -r engine/requirements.txt pypdf==6.5.0
      - name: Install locked JavaScript dependencies
        run: npm ci --loglevel verbose
      - name: Generate and benchmark 10k images plus 1k GIFs
        env:
          PYTHONPATH: engine
        run: |
          python scripts/benchmark_large_corpus.py \
            --images 10000 \
            --videos 1000 \
            --output performance-evidence
      - name: Build product renderer
        run: npm run build
      - name: Generate a real 500-page Chromium PDF
        id: report_benchmark
        continue-on-error: true
        env:
          MEL_REPORT_BENCHMARK_PAGES: '500'
          MEL_REPORT_BENCHMARK_OUTPUT: ${{ github.workspace }}/app/report-500-page-benchmark.json
          MEL_REPORT_BENCHMARK_PDF: ${{ github.workspace }}/app/report-500-page-benchmark.pdf
        run: xvfb-run -a npm run benchmark:report
      - name: Independently verify PDF page count and evidence
        id: pdf_verify
        if: always() && hashFiles('app/report-500-page-benchmark.json') != '' && hashFiles('app/report-500-page-benchmark.pdf') != ''
        continue-on-error: true
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          from pypdf import PdfReader

          evidence_path = Path('report-500-page-benchmark.json')
          pdf_path = Path('report-500-page-benchmark.pdf')
          evidence = json.loads(evidence_path.read_text(encoding='utf-8'))
          reader = PdfReader(str(pdf_path))
          page_count = len(reader.pages)
          digest = hashlib.sha256(pdf_path.read_bytes()).hexdigest()
          evidence['independent_pdf_page_count'] = page_count
          evidence['independent_pdf_sha256'] = digest
          evidence['independent_pdf_checks'] = {
              'exact_page_count': page_count == 500,
              'sha256_matches': evidence.get('pdf_sha256') == digest,
          }
          evidence_path.write_text(json.dumps(evidence, indent=2) + '\n', encoding='utf-8')
          if page_count != 500:
              raise SystemExit(f'expected 500 PDF pages, found {page_count}')
          if evidence.get('page_target') != 500 or evidence.get('html_page_count') != 500:
              raise SystemExit('renderer page evidence is inconsistent')
          if evidence.get('pdf_sha256') != digest:
              raise SystemExit('PDF SHA-256 does not match benchmark evidence')
          if not evidence.get('passed'):
              raise SystemExit(f"report benchmark failed: {evidence.get('criteria') or evidence.get('error')}")
          PY
      - name: Preserve benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-performance-evidence
          path: |
            app/performance-evidence/large-corpus-benchmark.json
            app/report-500-page-benchmark.json
            app/report-500-page-benchmark.pdf
          retention-days: 30
          if-no-files-found: warn
      - name: Enforce all stable performance criteria
        if: always()
        env:
          REPORT_STEP_OUTCOME: ${{ steps.report_benchmark.outcome }}
          PDF_VERIFY_OUTCOME: ${{ steps.pdf_verify.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          failures = []
          corpus_path = Path('performance-evidence/large-corpus-benchmark.json')
          report_path = Path('report-500-page-benchmark.json')
          pdf_path = Path('report-500-page-benchmark.pdf')

          if not corpus_path.is_file():
              failures.append('large-corpus evidence missing')
          else:
              corpus = json.loads(corpus_path.read_text(encoding='utf-8'))
              if not corpus.get('passed'):
                  failures.append(f"large-corpus criteria failed: {corpus.get('acceptance')}")
              scenario = corpus.get('scenario', {})
              if scenario.get('images') != 10000 or scenario.get('videos') != 1000:
                  failures.append(f'large-corpus fixture mismatch: {scenario}')

          if not report_path.is_file():
              failures.append('500-page report evidence missing')
          else:
              report = json.loads(report_path.read_text(encoding='utf-8'))
              if not report.get('passed'):
                  failures.append(f"500-page report criteria failed: {report.get('criteria') or report.get('error')}")
              independent = report.get('independent_pdf_checks', {})
              if independent and not all(independent.values()):
                  failures.append(f'independent PDF checks failed: {independent}')
          if not pdf_path.is_file():
              failures.append('500-page PDF missing')
          if os.environ.get('REPORT_STEP_OUTCOME') != 'success':
              failures.append(f"report benchmark step outcome={os.environ.get('REPORT_STEP_OUTCOME')}")
          if os.environ.get('PDF_VERIFY_OUTCOME') != 'success':
              failures.append(f"PDF verification step outcome={os.environ.get('PDF_VERIFY_OUTCOME')}")
          if failures:
              raise SystemExit('\n'.join(failures))
          PY
