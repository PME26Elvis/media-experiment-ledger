name: Desktop App CI
on:
  pull_request:
    branches: [app-main]
    paths: ['app/**', 'app-product-contract.json', '.github/workflows/app-ci.yml']
  push:
    branches: [app-v1-implementation]
    paths: ['app/**', 'app-product-contract.json', '.github/workflows/app-ci.yml']
permissions:
  contents: read
jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22.21.1' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install JavaScript dependencies
        run: npm install --loglevel verbose
      - run: npm run typecheck
      - run: npm test
      - run: python -m pip install -r engine/requirements.txt
      - run: python -m unittest discover -s engine/tests -p "test_*.py"
        env: { PYTHONPATH: engine }
      - run: npm run build
      - run: npx electron-builder --dir --publish never
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: app-ci-failure-${{ matrix.os }}
          path: |
            app/coverage
            app/dist
            ~/.npm/_logs
          retention-days: 7
