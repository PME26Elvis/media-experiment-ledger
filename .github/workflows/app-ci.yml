name: Desktop App CI
on:
  pull_request:
    branches: [app-main]
    paths: ['app/**', 'app-product-contract.json', '.github/workflows/app-ci.yml']
  push:
    branches: [app-v1-implementation]
    paths: ['app/**', 'app-product-contract.json', '.github/workflows/app-ci.yml']
permissions:
  contents: write
jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22.21.1' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Linux display runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Validate package manifest JSON
        run: node -e "JSON.parse(require('node:fs').readFileSync('package.json','utf8'))"
      - name: Install JavaScript dependencies
        run: npm install --loglevel verbose
      - name: Commit generated dependency lock
        if: runner.os == 'Linux' && github.event_name == 'push' && github.actor != 'github-actions[bot]'
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          git add app/package-lock.json
          if git diff --cached --quiet; then
            echo 'package-lock.json is already synchronized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'build(app): lock JavaScript dependencies'
          git push origin "HEAD:${GITHUB_REF_NAME}"
      - name: Typecheck
        run: node scripts/run-and-log.mjs typecheck.log npm run typecheck
      - name: JavaScript tests
        run: node scripts/run-and-log.mjs test.log npm test
      - name: Install engine dependencies
        run: python -m pip install -r engine/requirements.txt -r engine/requirements-build.txt
      - name: Python engine tests
        run: python -m unittest discover -s engine/tests -p "test_*.py"
        env: { PYTHONPATH: engine }
      - name: Build and smoke self-contained engine
        id: engine
        run: python scripts/build_engine.py
      - name: Build Electron application
        run: npm run build
      - name: Package unpacked application
        run: npx electron-builder --dir --publish never
      - name: Launch packaged application smoke
        id: packaged_smoke
        run: python scripts/smoke_packaged_app.py
      - name: Upload build and launch evidence
        if: ${{ success() && steps.engine.outcome == 'success' && steps.packaged_smoke.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-build-evidence-${{ matrix.os }}
          path: |
            app/engine-bin/mel-engine/engine-build-manifest.json
            app/packaged-smoke-evidence.json
            app/package-lock.json
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: app-ci-failure-${{ matrix.os }}
          path: |
            app/typecheck.log
            app/test.log
            app/coverage
            app/dist
            app/.engine-build
            app/engine-bin/mel-engine/engine-build-manifest.json
            app/packaged-smoke-evidence.json
            app/package-lock.json
            ~/.npm/_logs
          retention-days: 7
