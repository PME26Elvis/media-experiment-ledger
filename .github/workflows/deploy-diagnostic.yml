name: One-time deploy diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-diagnostic.yml'

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Capture recent failed workflow details
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, subprocess
          repo = os.environ['GITHUB_REPOSITORY']
          def gh(*args):
              result = subprocess.run(['gh', *args], text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              if result.returncode:
                  raise SystemExit(result.stderr or result.stdout)
              return result.stdout
          runs = json.loads(gh('api', f'repos/{repo}/actions/runs?per_page=50'))['workflow_runs']
          selected = [r for r in runs if r.get('conclusion') == 'failure'][:10]
          report = []
          analytics_run_ids = []
          for run in selected:
              jobs = json.loads(gh('api', f"repos/{repo}/actions/runs/{run['id']}/jobs?per_page=100"))['jobs']
              item = {
                  'run_id': run['id'],
                  'name': run['name'],
                  'workflow_id': run['workflow_id'],
                  'event': run['event'],
                  'head_sha': run['head_sha'],
                  'head_branch': run['head_branch'],
                  'created_at': run['created_at'],
                  'updated_at': run['updated_at'],
                  'html_url': run['html_url'],
                  'jobs': [],
              }
              for job in jobs:
                  failed_steps = [s for s in job.get('steps', []) if s.get('conclusion') == 'failure']
                  item['jobs'].append({
                      'id': job['id'],
                      'name': job['name'],
                      'conclusion': job['conclusion'],
                      'html_url': job['html_url'],
                      'failed_steps': failed_steps,
                  })
              report.append(item)
              if run['name'] == 'Build analytics, forecasts, and Pages':
                  analytics_run_ids.append(run['id'])
          with open('deploy-diagnostic.json', 'w', encoding='utf-8') as f:
              json.dump({'repository': repo, 'failed_runs': report}, f, ensure_ascii=False, indent=2)
          with open('deploy-failure-log.txt', 'w', encoding='utf-8') as f:
              for run_id in analytics_run_ids[:2]:
                  f.write(f'===== RUN {run_id} =====\n')
                  result = subprocess.run(['gh', 'run', 'view', str(run_id), '--repo', repo, '--log-failed'], text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
                  lines = result.stdout.splitlines()
                  f.write('\n'.join(lines[-220:]))
                  f.write('\n\n')
          PY
      - name: Commit diagnostic report
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deploy-diagnostic.json deploy-failure-log.txt
          git commit -m 'Capture deploy failure logs'
          git push origin HEAD:${{ github.head_ref }}
